<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>404 - Página no encontrada</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden; /* 🔥 elimina scroll */
    }

    body {
      background: #1f2937;
      font-family: Arial, sans-serif;
    }

    /* CONTENEDOR FULL */
    .full-404 {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #fff;
    }

    .box {
      max-width: 520px;
      padding: 20px;
    }

    h1 {
      font-size: 90px;
      margin: 0;
      color: #a855f7;
    }

    h2 {
      margin: 10px 0;
      font-size: 26px;
    }

    p {
      color: #d1d5db;
      line-height: 1.5;
    }

    a {
      display: inline-block;
      margin-top: 18px;
      padding: 12px 18px;
      border-radius: 10px;
      background: linear-gradient(135deg, #9333EA, #7c3aed);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      transition: 0.2s;
    }

    a:hover {
      background: linear-gradient(135deg, #a855f7, #9333ea);
    }
  </style>
</head>

<body>

  <div class="full-404">
    <div class="box">
      <h1>404</h1>
      <h2>Página no encontrada</h2>
      <p>El enlace está mal escrito o no existe.</p>
      <a href="/">Volver al inicio</a>
    </div>
  </div>

</body>
</html>
